spring:
  application:
    name: FLEET-SERVICE # Service name registered in Eureka
  datasource:
    url: jdbc:mysql://localhost:3306/fleetdb?useSSL=false&serverTimezone=UTC
    username: root # change to your DB username
    password: root # change to your DB password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # update schema automatically
    show-sql: true # log SQL queries
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8083 # FleetService runs on port 8083

